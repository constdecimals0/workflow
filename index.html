<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Workflow — a click-through walkthrough</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='35' y='5' width='30' height='30' rx='6' fill='%232ee66b'/><rect x='5' y='35' width='30' height='30' rx='6' fill='%23ff4d5e'/><rect x='65' y='35' width='30' height='30' rx='6' fill='%233aa0ff'/><rect x='35' y='65' width='30' height='30' rx='6' fill='%23ffd23f'/></svg>">
</head>
<body>
<noscript><p class="noscript">This walkthrough needs JavaScript. The source of truth is plain markdown: <a href="https://github.com/constdecimals0/workflow/blob/main/README.md">README.md</a> and <a href="https://github.com/constdecimals0/workflow/blob/main/example/tutorial.md">example/tutorial.md</a>.</p></noscript>

<header class="top">
  <div class="board" id="board" aria-hidden="true">
    <div class="pad pad-up" data-pad="green"></div>
    <div class="pad pad-left" data-pad="red"></div>
    <div class="hub" id="hub">1</div>
    <div class="pad pad-right" data-pad="blue"></div>
    <div class="pad pad-down" data-pad="yellow"></div>
  </div>
  <div class="top-text">
    <div class="top-title">THE WORKFLOW</div>
    <div class="dots" id="dots" role="tablist" aria-label="Steps"></div>
    <div class="step-count" id="step-count"></div>
  </div>
</header>

<main id="main">
  <article class="card" id="card" aria-live="polite">
    <div class="kicker" id="kicker"></div>
    <h1 id="title"></h1>
    <div class="body" id="body"></div>
  </article>
  <nav class="controls">
    <button class="btn back" id="back">◀ back</button>
    <button class="btn next" id="next">continue ▶</button>
  </nav>
  <p class="keys">→ / enter / space to continue · ← to go back</p>
</main>

<div class="clear-overlay" id="clear-overlay" aria-hidden="true">
  <div class="clear-inner">
    <div class="clear-line" id="clear-line">── /clear ──</div>
    <div class="clear-sub" id="clear-sub">fresh context</div>
  </div>
</div>

<script src="content.js"></script>
<script src="app.js"></script>
</body>
</html>
